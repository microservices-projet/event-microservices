# Existing configurations
spring.application.name=api-gateway
server.port=8080
spring.config.import=optional:configserver:http://localhost:9888

# OAuth2 Client configuration
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8180/realms/event-app
spring.security.oauth2.client.registration.keycloak.client-id=gateway
spring.security.oauth2.client.registration.keycloak.client-secret=gateway-secret
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=client_credentials

# OAuth2 Resource Server configuration (for JWT validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/event-app

# Local JWT configuration (used by user-service local tokens)
app.security.local-jwt.secret=your-256-bit-secret-key-for-jwt-signing
app.security.local-jwt.issuer=user-service-local