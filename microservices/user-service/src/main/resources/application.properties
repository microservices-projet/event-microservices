spring.application.name=user-service
server.port=8081
spring.config.import=optional:configserver:http://localhost:8888

# Kafka (docker-compose): INTERNAL listener kafka:29092 for containers; EXTERNAL localhost:9092 for IntelliJ/host
spring.kafka.bootstrap-servers=localhost:9092

# Keycloak JWT (docker-compose maps 8180 -> Keycloak 8080)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/event-app
app.keycloak.account-console-url=http://localhost:8180/realms/event-app/account

# Redis (email verification codes)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JPA
spring.jpa.hibernate.ddl-auto=update

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}
# Register in Eureka by default; set env vars to false for standalone local runs
eureka.client.register-with-eureka=${EUREKA_CLIENT_REGISTER:true}
eureka.client.fetch-registry=${EUREKA_CLIENT_FETCH_REGISTRY:true}

# When Kafka is down, listener containers can block startup ? off by default; enable when broker is up
spring.kafka.listener.auto-startup=${SPRING_KAFKA_LISTENER_AUTO_STARTUP:false}

# Reduce Kafka startup log noise without changing runtime behavior
logging.level.org.apache.kafka.clients.consumer.ConsumerConfig=WARN
logging.level.org.apache.kafka.clients.producer.ProducerConfig=WARN
logging.level.org.apache.kafka.common.utils.AppInfoParser=WARN
logging.level.org.apache.kafka.clients.Metadata=WARN
logging.level.org.apache.kafka.clients.NetworkClient=WARN
logging.level.org.apache.kafka.clients.consumer.internals=WARN
logging.level.org.apache.kafka.clients.producer.KafkaProducer=WARN
logging.level.org.springframework.kafka.support.LoggingProducerListener=WARN
logging.level.org.springframework.kafka.listener.KafkaMessageListenerContainer=WARN

# Local JWT configuration for user service
app.security.local-jwt.secret=your-256-bit-secret-key-for-jwt-signing
app.security.local-jwt.issuer=user-service-local

# Inter-service API (Feign / other microservices) ? set the same value on callers: app.user-service.inter-service-key
app.user.inter-service-key=change-me-user-service-internal

# Registration & validation
app.user.registration.email-verified-by-default=true
app.user.validation.require-email-verified=false
app.user.validate.allow-anonymous=true
app.user.verification.expose-code-in-response=false
app.user.verification.code-ttl-minutes=15

# Account deletion grace period & scheduler
app.user.deletion.grace-days=7
app.user.deletion.scheduler-enabled=true
app.user.deletion.purge-cron=0 0 3 * * *
