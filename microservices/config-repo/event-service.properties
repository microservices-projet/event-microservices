server.port=8082
app.security.local-jwt.secret=your-256-bit-secret-key-for-jwt-signing
app.security.local-jwt.issuer=user-service-local
spring.datasource.url=jdbc:mysql://localhost:3306/event-db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=event-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=true

# Feign Configuration
feign.client.config.user-service.url=http://user-service:8081
feign.client.config.default.connect-timeout=10000
feign.client.config.default.read-timeout=10000

# Cache Configuration
spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379

# Logging
logging.level.org.example.eventmodule=DEBUG
logging.level.org.springframework.cloud.openfeign=DEBUG

