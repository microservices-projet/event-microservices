server.port=8081
# Keep config-repo aligned with the actual stack defaults.
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.kafka.listener.auto-startup=true
spring.kafka.bootstrap-servers=localhost:9092
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/event-app
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.jpa.hibernate.ddl-auto=update
app.user.inter-service-key=change-me-user-service-internal
app.keycloak.account-console-url=http://localhost:8180/realms/event-app/account
