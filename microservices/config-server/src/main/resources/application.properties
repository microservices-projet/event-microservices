spring.application.name=config-server
server.port=8888

# Native centralized configuration repository (local files).
spring.profiles.active=native
spring.cloud.config.server.native.searchLocations=${CONFIG_REPO_LOCATION:file:../config-repo}
spring.cloud.config.server.native.addLabelLocations=false

# Actuator
management.endpoints.web.exposure.include=health,info,refresh,env
management.endpoint.health.show-details=always
management.endpoint.refresh.enabled=true
# Eureka integration readiness
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

