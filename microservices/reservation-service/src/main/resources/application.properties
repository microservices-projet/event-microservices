spring.application.name=reservation-service
server.port=8084

# Config Server on host (IntelliJ): port 8888. Port 9888 is only when Config Server runs in Docker with 9888:8888 published.
spring.config.import=optional:configserver:http://localhost:8888

# Kafka: IntelliJ/host uses localhost:9092. Apps in Docker Compose use kafka:29092 (INTERNAL listener).
spring.kafka.bootstrap-servers=localhost:9092

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Keycloak (fallback; config-repo application.properties overrides when Config Server is up)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/event-app

# Local JWT branch (see CompositeJwtDecoderConfig)
app.security.local-jwt.secret=your-256-bit-secret-key-for-jwt-signing
app.security.local-jwt.issuer=user-service-local
