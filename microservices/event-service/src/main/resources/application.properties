spring.application.name=event-service
server.port=8082
spring.config.import=optional:configserver:http://localhost:8888

# Kafka: host/JVM uses localhost:9092. In Docker use SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092 (broker hostname on the compose network).
spring.kafka.bootstrap-servers=localhost:9092
app.services.user-service.url=http://localhost:8080
app.outbox.publish-interval-ms=100

# Required by CompositeJwtDecoderConfig (align with user-service for local JWT fallback)
app.security.local-jwt.secret=your-256-bit-secret-key-for-jwt-signing
app.security.local-jwt.issuer=user-service-local
