spring.application.name=analytics-streams-service
# Config Server local script: port 8888 (9888 only if mapped in Docker).
spring.config.import=optional:configserver:http://localhost:8888

# Fallbacks if Config Server is down (same as config-repo/application.properties + service file)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.cloud.discovery.enabled=true

# Kafka: host uses localhost:9092. In Docker: SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
spring.kafka.bootstrap-servers=localhost:9092

# Mongo / Redis (overridden by config-repo when Config Server is up)
spring.data.mongodb.uri=mongodb://localhost:27017/analytics-db
spring.data.redis.host=localhost
spring.data.redis.port=6379

server.port=8086

# Start Kafka Streams only when broker is reachable; see AnalyticsStreamsProcessor
analytics.kafka-streams.enabled=true
# RocksDB state (Windows-friendly: under JVM temp dir)
analytics.kafka-streams.state-dir=${java.io.tmpdir}/kafka-streams-analytics-mvp
