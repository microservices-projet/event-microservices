<div class="ija-page">
  <div class="list-header">
    <h1 class="ija-page__title">Feedbacks</h1>
    <a routerLink="./add" class="btn-ija btn-ija--primary">+ Nouveau feedback</a>
  </div>

  <div class="list-loading" *ngIf="loading">
    <div class="spinner"></div>
    <p>Chargement...</p>
  </div>

  <div class="list-empty" *ngIf="!loading && feedbacks.length === 0">
    <p>Aucun feedback pour le moment</p>
    <a routerLink="./add" class="btn-ija btn-ija--outline">Donner un avis</a>
  </div>

  <div class="feedback-grid" *ngIf="!loading && feedbacks.length > 0">
    <div *ngFor="let fb of feedbacks" class="feedback-card ija-card ija-card--interactive">
      <div class="feedback-card__header">
        <div class="feedback-card__stars">
          <span *ngFor="let s of getStars(fb.rating)" [class.star--filled]="s === 1" class="star">&#9733;</span>
        </div>
        <span class="ija-badge" [ngClass]="statusClass(fb.status)">{{ fb.status }}</span>
      </div>
      <div class="feedback-card__body">
        <p class="feedback-card__comment">{{ fb.comment }}</p>
        <div class="feedback-card__meta">
          <span *ngIf="fb.username">{{ fb.username }}</span>
          <span *ngIf="fb.eventTitle"> &bull; {{ fb.eventTitle }}</span>
          <span class="feedback-card__date">{{ fb.createdAt | date:'dd/MM/yyyy' }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
