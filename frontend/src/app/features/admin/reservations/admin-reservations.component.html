<div class="admin-workspace">
  <h1 class="ija-page__title">Admin Reservations</h1>
  <form class="filter-bar" (ngSubmit)="onApply()" autocomplete="off">
    <input class="ija-input" name="userId" [(ngModel)]="userId" placeholder="userId" inputmode="numeric" autocomplete="off" />
    <input class="ija-input" name="eventId" [(ngModel)]="eventId" placeholder="eventId" inputmode="numeric" autocomplete="off" />
    <select class="ija-input" name="status" [(ngModel)]="status">
      <option value="">All statuses</option>
      <option value="PENDING">PENDING</option>
      <option value="CONFIRMED">CONFIRMED</option>
      <option value="CANCELLED">CANCELLED</option>
      <option value="EXPIRED">EXPIRED</option>
    </select>
    <select class="ija-input" name="paymentStatus" [(ngModel)]="paymentStatus">
      <option value="">All payments</option>
      <option value="PENDING">PENDING</option>
      <option value="PAID">PAID</option>
      <option value="REFUNDED">REFUNDED</option>
      <option value="FAILED">FAILED</option>
    </select>
    <button type="submit" class="btn-ija btn-ija--primary" [disabled]="loading">Apply</button>
    <button type="button" class="btn-ija btn-ija--ghost" [disabled]="loading" (click)="clearFilters()">Clear</button>
  </form>
  <div class="filter-note" *ngIf="hasActiveFilters">Filters are active. Clear to show all reservations.</div>
  <div class="list-error" *ngIf="!loading && loadError">{{ loadError }}</div>
  <div *ngIf="loading" class="list-loading"><div class="spinner"></div></div>
  <div class="table-wrap" *ngIf="!loading && !loadError">
    <table class="admin-table">
      <thead><tr><th>ID</th><th>User</th><th>Event</th><th>Status</th><th>Payment</th><th>Total</th><th>Actions</th></tr></thead>
      <tbody>
        <tr *ngFor="let r of reservations">
          <td>{{ r.id | slice:0:8 }}</td><td>{{ r.userId }}</td><td>{{ r.eventId }}</td><td>{{ r.status }}</td><td>{{ r.paymentStatus }}</td><td>{{ r.totalPrice }}</td>
          <td><button class="btn-ija btn-ija--danger btn-ija--sm" (click)="cancel(r)">Cancel</button></td>
        </tr>
        <tr *ngIf="reservations.length === 0">
          <td colspan="7" class="empty-row">No reservations found for current filters.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
