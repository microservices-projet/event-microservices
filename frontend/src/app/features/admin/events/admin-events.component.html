<div class="admin-workspace">
  <h1 class="ija-page__title">Admin Events</h1>
  <form class="filter-bar" (ngSubmit)="onApply()">
    <input class="ija-input" name="keyword" [(ngModel)]="keyword" placeholder="Keyword" />
    <select class="ija-input" name="status" [(ngModel)]="status">
      <option value="">All status</option><option>PUBLISHED</option><option>DRAFT</option><option>CANCELLED</option><option>COMPLETED</option>
    </select>
    <select class="ija-input" name="archived" [(ngModel)]="archived">
      <option value="">Archived any</option><option value="false">Not archived</option><option value="true">Archived</option>
    </select>
    <button type="submit" class="btn-ija btn-ija--primary" [disabled]="loading">Apply</button>
    <button type="button" class="btn-ija btn-ija--ghost" [disabled]="loading" (click)="clearFilters()">Clear</button>
  </form>
  <div *ngIf="loading" class="list-loading"><div class="spinner"></div></div>
  <div class="table-wrap" *ngIf="!loading">
    <table class="admin-table">
      <thead><tr><th>ID</th><th>Title</th><th>Date</th><th>Status</th><th>Places</th><th>Actions</th></tr></thead>
      <tbody>
        <tr *ngFor="let e of events">
          <td>{{ e.id }}</td><td>{{ e.title }}</td><td>{{ e.date | date:'dd/MM/yyyy HH:mm' }}</td><td>{{ e.status }}</td><td>{{ e.nbPlaces }}</td>
          <td><button class="btn-ija btn-ija--danger btn-ija--sm" (click)="archive(e)">Archive</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
